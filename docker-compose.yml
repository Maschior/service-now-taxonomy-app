version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: taxonomy-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: taxonomy-app
    volumes:
      - mongodb_data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: taxonomy-server
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/taxonomy-app
      PORT: 5000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:4173
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: taxonomy-client
    ports:
      - "4173:4173"
    environment:
      VITE_API_URL: http://server:5000
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongodb_data:
