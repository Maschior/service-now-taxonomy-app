version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: taxonomy-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: taxonomy-app
    volumes:
      - mongodb_data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: taxonomy-server
    ports:
      - "5005:5005"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/taxonomy-app
      PORT: 5005
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: taxonomy-client
    ports:
      - "5173:4173"
    depends_on:
      - server

volumes:
  mongodb_data:
